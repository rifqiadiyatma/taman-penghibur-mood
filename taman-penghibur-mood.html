<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taman Penghibur 🌸</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --sky-top: #FFE8EE;
      --sky-bottom: #FFF6E9;
      --grass: #B7DDB0;
      --grass-dark: #98C990;
      --pink: #FF9EC4;
      --pink-soft: #FFD3E6;
      --lavender: #D9C7FF;
      --butter: #FFE49A;
      --mint: #BDEBD1;
      --plum: #5B4066;
      --plum-soft: #8A7291;
      --card: #FFFDFB;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%);
      color: var(--plum);
      overflow-x: hidden;
    }

    .sun {
      position: fixed;
      top: -40px;
      right: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFF3C4, var(--butter) 70%);
      box-shadow: 0 0 60px 20px rgba(255, 228, 154, 0.5);
      z-index: 0;
    }

    .petal {
      position: fixed;
      top: -30px;
      pointer-events: none;
      z-index: 1;
      font-size: 20px;
      opacity: 0.85;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    .wrap {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 0;
      text-align: center;
    }

    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(28px, 6vw, 42px);
      color: var(--pink);
      margin: 0 0 6px;
      text-shadow: 2px 2px 0 #fff;
    }

    .subtitle {
      font-size: 16px;
      color: var(--plum-soft);
      font-weight: 600;
      margin: 0 0 4px;
    }

    .instruksi {
      font-size: 14px;
      color: var(--plum-soft);
      margin: 10px 0 26px;
    }

    .name-box {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: var(--card);
      border: 2px solid var(--pink-soft);
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 26px;
      box-shadow: 0 4px 0 var(--pink-soft);
    }

    .name-box input {
      border: none;
      outline: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--plum);
      width: 130px;
      background: transparent;
    }

    .name-box span {
      font-size: 18px;
    }

    .progress {
      font-family: 'Baloo 2', cursive;
      font-size: 15px;
      color: var(--pink);
      margin-bottom: 14px;
    }

    .bar {
      width: 220px;
      height: 10px;
      margin: 0 auto 30px;
      background: var(--pink-soft);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--pink), var(--lavender));
      transition: width .5s ease;
    }

    .garden {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      max-width: 520px;
      margin: 0 auto 10px;
    }

    .plot {
      position: relative;
      aspect-ratio: 1/1;
      background: linear-gradient(180deg, #fff, var(--mint) 120%);
      border-radius: 20px;
      border: 3px solid #fff;
      box-shadow: 0 6px 0 rgba(180, 160, 190, 0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      transition: transform .15s ease;
      user-select: none;
    }

    .plot:hover {
      transform: translateY(-3px) scale(1.03);
    }

    .plot:active {
      transform: translateY(1px) scale(0.97);
    }

    .plot.bloomed {
      cursor: default;
      background: linear-gradient(180deg, #fff, var(--pink-soft) 130%);
    }

    .plot .bud {
      animation: wiggle 2.4s ease-in-out infinite;
    }

    @keyframes wiggle {

      0%,
      100% {
        transform: rotate(-4deg);
      }

      50% {
        transform: rotate(4deg);
      }
    }

    .plot .flower {
      animation: pop .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes pop {
      0% {
        transform: scale(0) rotate(-30deg);
        opacity: 0;
      }

      70% {
        transform: scale(1.25) rotate(8deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    .bubble {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13.5px;
      color: var(--plum);
      background: var(--card);
      border: 2px solid var(--pink-soft);
      border-radius: 14px;
      padding: 8px 10px;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      width: 150px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      opacity: 0;
      animation: bubbleIn .4s ease forwards .1s;
      z-index: 5;
      pointer-events: none;
    }

    @keyframes bubbleIn {
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(-8px);
      }
    }

    .bubble:after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: var(--pink-soft);
    }

    .hug-btn {
      font-family: 'Baloo 2', cursive;
      font-size: 17px;
      background: var(--pink);
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 999px;
      box-shadow: 0 5px 0 #E37AA3;
      cursor: pointer;
      margin: 26px 0 10px;
      transition: transform .1s ease;
    }

    .hug-btn:hover {
      transform: translateY(-2px);
    }

    .hug-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #E37AA3;
    }

    .final-card {
      max-width: 420px;
      margin: 16px auto 40px;
      background: var(--card);
      border: 3px solid var(--pink-soft);
      border-radius: 24px;
      padding: 24px 22px;
      box-shadow: 0 8px 0 var(--pink-soft);
      display: none;
    }

    .final-card.show {
      display: block;
      animation: pop .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    .final-card h2 {
      font-family: 'Baloo 2', cursive;
      color: var(--pink);
      margin: 0 0 8px;
      font-size: 22px;
    }

    .final-card p {
      font-size: 14.5px;
      line-height: 1.6;
      margin: 0;
    }

    .photo-upload {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 2px dashed var(--pink-soft);
      padding: 8px 16px;
      border-radius: 999px;
      margin: 0 0 22px;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
      font-size: 14px;
      color: var(--pink);
      transition: transform .1s ease;
    }

    .photo-upload:hover {
      transform: translateY(-2px);
    }

    .photo-upload input {
      display: none;
    }

    .polaroid {
      display: none;
      width: 170px;
      margin: 0 auto 24px;
      background: #fff;
      padding: 10px 10px 26px;
      border-radius: 6px;
      box-shadow: 0 8px 18px rgba(90, 60, 80, 0.18);
      transform: rotate(-4deg);
      position: relative;
    }

    .polaroid.show {
      display: block;
      animation: pop .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    .polaroid img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }

    .placeholder-illust {
      border-radius: 2px;
      overflow: hidden;
    }

    .polaroid .caption {
      font-family: 'Baloo 2', cursive;
      font-size: 13px;
      color: var(--plum-soft);
      text-align: center;
      margin-top: 8px;
    }

    .polaroid .sticker {
      position: absolute;
      font-size: 22px;
    }

    .polaroid .sticker.s1 {
      top: -12px;
      left: -10px;
      transform: rotate(-15deg);
    }

    .polaroid .sticker.s2 {
      bottom: 14px;
      right: -14px;
      transform: rotate(20deg);
    }

    .sound-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: var(--card);
      border: 2px solid var(--pink-soft);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 0 var(--pink-soft);
    }

    .grass {
      position: relative;
      margin-top: 20px;
      height: 60px;
      background: linear-gradient(180deg, var(--grass), var(--grass-dark));
      border-radius: 50% 50% 0 0 / 30px 30px 0 0;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--plum-soft);
      padding: 14px 0 24px;
      position: relative;
      z-index: 2;
    }

    @media (max-width: 420px) {
      .wrap {
        padding: 32px 14px 0;
      }

      .garden {
        gap: 10px;
      }

      .plot {
        font-size: 26px;
        border-radius: 16px;
      }

      .bubble {
        width: 112px;
        font-size: 11.5px;
        padding: 6px 7px;
        line-height: 1.3;
      }

      .name-box {
        padding: 7px 12px;
      }

      .name-box input {
        width: 100px;
        font-size: 14px;
      }

      .polaroid {
        width: 140px;
      }

      .polaroid img {
        height: 122px;
      }

      .hug-btn {
        font-size: 15px;
        padding: 12px 20px;
      }

      .sound-toggle {
        width: 38px;
        height: 38px;
        font-size: 16px;
        top: 10px;
        right: 10px;
      }
    }

    .music-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: var(--card);
      border: 2px solid var(--pink-soft);
      padding: 9px 16px;
      border-radius: 999px;
      font-family: 'Baloo 2', cursive;
      font-size: 13px;
      color: var(--pink);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 3px 0 var(--pink-soft);
      cursor: pointer;
    }

    @media (max-width: 340px) {
      .garden {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width:420px) {
      .music-btn {
        font-size: 11px;
        padding: 7px 12px;
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>

<body>

  <div class="sun"></div>
  <div id="petals"></div>
  <button class="sound-toggle" id="soundToggle" title="Nyalakan/matikan efek suara">🔊</button>
  <button class="music-btn" id="musicBtn">🎵 Putar musik</button>
  <audio id="bgMusic" src="music.mp3" loop preload="none"></audio>

  <div class="wrap">
    <h1>Taman Penghibur 🌸</h1>
    <p class="subtitle">Khusus buat kamu yang moodnya lagi jelek</p>
    <p class="instruksi">Tiap kuncup yang kamu sentuh bakal mekar jadi pesan semangat kecil~ 🌷</p>

    <div class="name-box">
      <span>💌</span>
      <input id="namaInput" type="text" placeholder="tulis nama kamu di sini" maxlength="20">
    </div>
    <br>

    <div class="polaroid show" id="polaroid">
      <span class="sticker s1">🌸</span>

      <img id="polaroidImg" src="foto.jpg" alt="foto">
      <div class="caption" id="polaroidCaption">semoga hari kamu semanis ini ya 🥹</div>
      <span class="sticker s2">💗</span>
    </div>

    <div class="progress" id="progressText">0 dari 8 bunga sudah mekar</div>
    <div class="bar">
      <div class="bar-fill" id="barFill"></div>
    </div>

    <div class="garden" id="garden"></div>

    <button class="hug-btn" id="hugBtn">Kirim pelukan virtual 🤗</button>

    <div class="final-card" id="finalCard">
      <h2>Taman kamu udah mekar penuh! 🌼</h2>
      <p id="finalText"></p>
    </div>
  </div>

  <div class="grass"></div>
  <footer>dibuat dengan sepenuh hati, semoga harimu membaik 🌈</footer>

  <script>
    const messages = [
      "Capek boleh, nyerah jangan ya 🌷",
      "Kamu udah keren cuma dengan bertahan hari ini 💪",
      "Boleh sedih, tapi jangan lama-lama, aku nungguin senyum kamu 🌼",
      "Semoga abis ini semuanya jadi lebih ringan ✨",
      "Kalau capek, istirahat dulu gapapa banget 🫶",
      "Kamu pantas dapet hal-hal baik hari ini 🌸",
      "Satu masalah nggak nentuin seberapa hebat kamu 💛",
      "Aku bangga sama kamu, walau kecil-kecilan aja 🌻",
      "Semangatnya boleh drop, hatinya jangan ikutan drop ya 🌱",
      "Besok pasti ada versi hari yang lebih baik 🌤️",
      "Kamu nggak sendirian ngadepin ini 🤍",
      "Pelan-pelan aja, nggak ada yang buru-buru kok 🐌🌷"
    ];

    const hugMessages = [
      "*hug erat-erat* semuanya bakal baik-baik aja kok 🤗",
      "Pelukan terkirim! Rasain hangatnya ya 💛",
      "*peluk dari jauh* jangan lupa senyum sedikit 😊",
      "Ini pelukan virtual paling tulus dari aku buat kamu 🌸"
    ];

    const budEmojis = ["🌱", "🌿", "🌾", "🌱", "🌿", "🌾", "🌱", "🌿"];
    const flowerEmojis = ["🌸", "🌷", "🌼", "🌻", "🪷", "🌹", "💐", "🌺"];

    const garden = document.getElementById('garden');
    const progressText = document.getElementById('progressText');
    const barFill = document.getElementById('barFill');
    const finalCard = document.getElementById('finalCard');
    const finalText = document.getElementById('finalText');
    const namaInput = document.getElementById('namaInput');

    let bloomedCount = 0;
    const total = 8;
    let usedMessages = [];

    // ---- Sound effects (Web Audio API, tanpa file eksternal) ----
    let soundOn = true;
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playTone(freqs, duration = 0.18, type = 'sine', gainVal = 0.08) {
      if (!soundOn) return;
      const ctx = getCtx();
      const now = ctx.currentTime;
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f, now + i * 0.06);
        gain.gain.setValueAtTime(0, now + i * 0.06);
        gain.gain.linearRampToValueAtTime(gainVal, now + i * 0.06 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + duration);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i * 0.06);
        osc.stop(now + i * 0.06 + duration + 0.05);
      });
    }
    function playPop() { playTone([660, 880], 0.15, 'triangle', 0.09); }
    function playChime() { playTone([523, 659, 784, 1046], 0.35, 'sine', 0.07); }
    function playClick() { playTone([440], 0.12, 'square', 0.05); }

    document.getElementById('soundToggle').addEventListener('click', function () {
      soundOn = !soundOn;
      this.textContent = soundOn ? '🔊' : '🔇';
      if (soundOn) getCtx();
    });

    // ---- Musik latar dari file lokal (lagu.mp3) ----
    const bgMusic = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let musicPlaying = false;
    const MUSIC_START = 49; // detik mulai

    function startMusic() {
      bgMusic.currentTime = MUSIC_START;
      bgMusic.play().then(() => {
        musicPlaying = true;
        musicBtn.textContent = '⏸️ Jeda musik';
      }).catch(() => {
        // autoplay diblokir browser, tunggu interaksi pertama
      });
    }

    // coba autoplay begitu halaman siap
    window.addEventListener('load', () => {
      bgMusic.addEventListener('loadedmetadata', () => {
        if (!musicPlaying) startMusic();
      }, { once: true });
      // fallback kalau metadata gagal kebaca / autoplay diblokir
      setTimeout(() => { if (!musicPlaying) startMusic(); }, 400);
    });

    // kalau autoplay diblokir, mulai otomatis begitu ada interaksi pertama di halaman
    function tryStartOnFirstInteraction() {
      if (!musicPlaying) startMusic();
      document.removeEventListener('click', tryStartOnFirstInteraction);
      document.removeEventListener('touchstart', tryStartOnFirstInteraction);
    }
    document.addEventListener('click', tryStartOnFirstInteraction);
    document.addEventListener('touchstart', tryStartOnFirstInteraction);

    musicBtn.addEventListener('click', () => {
      if (!musicPlaying) {
        startMusic();
        if (!bgMusic.currentTime) {
          alert('Taruh file "lagu.mp3" di folder yang sama dengan file HTML ini ya, biar musiknya bisa muter 🎵');
        }
      } else {
        bgMusic.pause();
        musicPlaying = false;
        musicBtn.textContent = '🎵 Putar musik';
      }
    });

    function pickMessage() {
      if (usedMessages.length >= messages.length) usedMessages = [];
      let m;
      do { m = messages[Math.floor(Math.random() * messages.length)]; }
      while (usedMessages.includes(m));
      usedMessages.push(m);
      return m;
    }

    for (let i = 0; i < total; i++) {
      const plot = document.createElement('div');
      plot.className = 'plot';
      plot.innerHTML = `<span class="bud">${budEmojis[i]}</span>`;
      plot.addEventListener('click', () => bloom(plot, i), { once: true });
      garden.appendChild(plot);
    }

    function bloom(plot, i) {
      plot.classList.add('bloomed');
      const msg = pickMessage();
      plot.innerHTML = `
    <div class="bubble">${msg}</div>
    <span class="flower">${flowerEmojis[i]}</span>
  `;
      bloomedCount++;
      progressText.textContent = `${bloomedCount} dari ${total} bunga sudah mekar`;
      barFill.style.width = (bloomedCount / total * 100) + '%';
      playPop();

      if (bloomedCount === total) {
        const nama = namaInput.value.trim();
        const sapaan = nama ? nama : "kamu";
        finalText.textContent = `Buat ${sapaan}: makasih udah mau mampir ke taman kecil ini. Semoga mood kamu ikut mekar kayak bunga-bunga tadi ya. Aku selalu di sini kalau kamu butuh cerita 🌷`;
        finalCard.classList.add('show');
        spawnPetalBurst();
        setTimeout(playChime, 150);
      }
    }

    document.getElementById('hugBtn').addEventListener('click', () => {
      const m = hugMessages[Math.floor(Math.random() * hugMessages.length)];
      playClick();
      alert(m);
    });

    // ambient falling petals
    const petalContainer = document.getElementById('petals');
    const petalChars = ["🌸", "🌷", "🍃", "✨"];
    function spawnPetal() {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (14 + Math.random() * 14) + 'px';
      const duration = 8 + Math.random() * 6;
      p.style.animationDuration = duration + 's';
      petalContainer.appendChild(p);
      setTimeout(() => p.remove(), duration * 1000);
    }
    setInterval(spawnPetal, 900);
    for (let i = 0; i < 5; i++) setTimeout(spawnPetal, i * 300);

    function spawnPetalBurst() {
      for (let i = 0; i < 20; i++) setTimeout(spawnPetal, i * 60);
    }
  </script>

</body>

</html>
